<style>
    #ai-chat-widget {
        position: fixed;
        right: 30px;
        bottom: 30px;
        z-index: 9999;
        font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif;
        user-select: none;
    }

    #ai-chat-bubble {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        box-shadow: 0 6px 30px rgba(102, 126, 234, 0.5);
        cursor: move;
        transition: all 0.3s ease;
        border: 3px solid #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    #ai-chat-bubble:hover {
        transform: scale(1.15);
        box-shadow: 0 8px 40px rgba(102, 126, 234, 0.7);
    }

    #ai-chat-bubble img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        border-radius: 50%;
    }

    #ai-chat-window {
        position: absolute;
        bottom: 90px;
        right: 0;
        width: 380px;
        height: 560px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 15px 50px rgba(0,0,0,0.3);
        display: none;
        flex-direction: column;
        overflow: hidden;
    }

    #ai-chat-window.open {
        display: flex;
    }

    #ai-chat-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 18px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        cursor: move;
    }

    #ai-chat-header h3 {
        margin: 0;
        font-size: 15px;
        display: flex;
        align-items: center;
        gap: 8px;
    }

    #ai-chat-close {
        background: none;
        border: none;
        color: white;
        font-size: 22px;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.3s;
        line-height: 1;
    }

    #ai-chat-close:hover {
        opacity: 1;
    }

    /* 状态栏样式 */
    .ai-status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        background: #f0f4f8;
        border-bottom: 1px solid #e2e8f0;
        font-size: 11px;
    }

    .ai-status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .ai-status-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        animation: pulse 1.5s infinite;
    }

    .ai-status-dot.online {
        background: #48bb78;
        box-shadow: 0 0 5px #48bb78;
    }

    .ai-status-dot.local {
        background: #fbbf24;
        box-shadow: 0 0 5px #fbbf24;
    }

    .ai-status-dot.offline {
        background: #f56565;
        box-shadow: 0 0 5px #f56565;
    }

    @keyframes pulse {
        0% { opacity: 0.5; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0.5; transform: scale(0.8); }
    }

    .ai-status-text {
        color: #4a5568;
        font-weight: 500;
    }

    .ai-status-mode {
        background: #e2e8f0;
        padding: 2px 8px;
        border-radius: 12px;
        font-size: 10px;
        font-weight: bold;
    }

    .ai-status-mode.mcp {
        background: #805ad5;
        color: white;
    }

    .ai-status-mode.local {
        background: #fbbf24;
        color: #744210;
    }

    .ai-status-mode.ai {
        background: #48bb78;
        color: white;
    }

    #ai-chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        background: #f7fafc;
    }

    .ai-message {
        margin-bottom: 12px;
        display: flex;
        gap: 8px;
    }

    .ai-message.user {
        flex-direction: row-reverse;
    }

    .ai-message-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 14px;
        flex-shrink: 0;
    }

    .ai-message.user .ai-message-avatar {
        background: #48bb78;
    }

    .ai-message-content {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 16px;
        line-height: 1.5;
        font-size: 13px;
        word-wrap: break-word;
        white-space: pre-wrap;
    }

    .ai-message.bot .ai-message-content {
        background: white;
        color: #333;
        border-bottom-left-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .ai-message.user .ai-message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border-bottom-right-radius: 4px;
    }

    #ai-chat-input-area {
        padding: 12px;
        background: white;
        border-top: 1px solid #e2e8f0;
        display: flex;
        gap: 8px;
    }

    #ai-chat-input {
        flex: 1;
        padding: 10px 14px;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        outline: none;
        font-size: 13px;
        transition: border-color 0.3s;
    }

    #ai-chat-input:focus {
        border-color: #667eea;
    }

    #ai-chat-send {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
        color: white;
        cursor: pointer;
        font-size: 16px;
        transition: transform 0.3s, box-shadow 0.3s;
        line-height: 1;
    }

    #ai-chat-send:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 15px rgba(102, 126, 234, 0.5);
    }

    #ai-chat-send:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .ai-typing {
        display: flex;
        gap: 3px;
        padding: 10px 14px;
    }

    .ai-typing span {
        width: 7px;
        height: 7px;
        background: #667eea;
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out;
    }

    .ai-typing span:nth-child(2) {
        animation-delay: 0.2s;
    }

    .ai-typing span:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes typing {
        0%, 60%, 100% {
            transform: translateY(0);
        }
        30% {
            transform: translateY(-8px);
        }
    }

    .mcp-tool-badge {
        display: inline-block;
        background: #805ad5;
        color: white;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 12px;
        margin-left: 8px;
        vertical-align: middle;
    }

    @media (max-width: 450px) {
        #ai-chat-window {
            width: calc(100vw - 30px);
            height: 60vh;
            right: -10px;
        }

        #ai-chat-bubble {
            width: 60px;
            height: 60px;
        }
    }

</style>

<div id="ai-chat-widget">
    <div id="ai-chat-bubble" onmousedown="startDrag(event)">
        <img src="/image.jpg" alt="AI Assistant" onerror="this.style.display='none'; this.parentElement.innerHTML='🤖';">
    </div>

    <div id="ai-chat-window">
        <div id="ai-chat-header">
            <h3>🤖 电影小助手 <span class="mcp-tool-badge" id="mcp-status-badge">智能</span></h3>
            <div style="display: flex; gap: 8px;">
                <button id="ai-chat-clear" onclick="clearChatHistory()" style="background: none; border: none; color: white; cursor: pointer; font-size: 18px; padding: 0 8px;" title="清除聊天历史">🗑️</button>
                <button id="ai-chat-close" onclick="toggleChatWindow()">&times;</button>
            </div>
        </div>

        <!-- 状态栏 -->
        <div id="ai-chat-status-bar" class="ai-status-bar" style="display: none;">
            <div class="ai-status-indicator">
                <div id="ai-status-dot" class="ai-status-dot offline"></div>
                <span id="ai-status-text" class="ai-status-text">检测中...</span>
            </div>
            <div>
                <span id="ai-status-mode" class="ai-status-mode">初始化</span>
            </div>
        </div>

        <div id="ai-chat-messages">
        </div>

        <div id="ai-chat-input-area">
            <input type="text" id="ai-chat-input" placeholder="输入您的问题... 试试：推荐电影、搜索肖申克的救赎、科幻片推荐" onkeypress="handleKeyPress(event)">
            <button id="ai-chat-send" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    var chatContext = [];
    var isOpen = false;
    var mcpEnabled = true;
    var currentMode = 'unknown'; // 'mcp', 'local', 'ai', 'offline'

    var isDragging = false;
    var hasDragged = false;
    var dragStartX = 0;
    var dragStartY = 0;
    var dragOffsetX = 0;
    var dragOffsetY = 0;
    var widgetPosX = 30;
    var widgetPosY = 30;
    var DRAG_THRESHOLD = 5;
    var wasOpenBeforeDrag = false;

    var STORAGE_KEY = 'ai_chat_history';
    var POSITION_KEY = 'ai_chat_position';

    // ==================== 本地电影数据 ====================
    var LOCAL_MOVIE_DATA = {
        "top_rated": [
            {"title": "肖申克的救赎", "rating": 9.7, "year": 1994, "director": "弗兰克·德拉邦特", "genre": "剧情", "description": "希望让人自由，一部关于希望与救赎的经典之作。"},
            {"title": "霸王别姬", "rating": 9.6, "year": 1993, "director": "陈凯歌", "genre": "剧情", "description": "风华绝代，一曲人生悲歌。"},
            {"title": "阿甘正传", "rating": 9.5, "year": 1994, "director": "罗伯特·泽米吉斯", "genre": "剧情", "description": "人生就像一盒巧克力，你永远不知道下一块是什么味道。"},
            {"title": "泰坦尼克号", "rating": 9.5, "year": 1997, "director": "詹姆斯·卡梅隆", "genre": "爱情/灾难", "description": "永恒的爱情，永不沉没的经典。"},
            {"title": "盗梦空间", "rating": 9.4, "year": 2010, "director": "克里斯托弗·诺兰", "genre": "科幻/悬疑", "description": "梦境与现实，一场关于意识的大胆探索。"},
            {"title": "星际穿越", "rating": 9.4, "year": 2014, "director": "克里斯托弗·诺兰", "genre": "科幻", "description": "穿越时空的爱，人类命运的终极探索。"},
            {"title": "千与千寻", "rating": 9.4, "year": 2001, "director": "宫崎骏", "genre": "动画/奇幻", "description": "成长的旅程，宫崎骏的巅峰之作。"},
            {"title": "海上钢琴师", "rating": 9.3, "year": 1998, "director": "朱塞佩·托纳多雷", "genre": "剧情/音乐", "description": "1900的故事，音乐与自由的传奇。"},
            {"title": "忠犬八公的故事", "rating": 9.4, "year": 2009, "director": "莱塞·霍尔斯道姆", "genre": "剧情", "description": "等待是最长情的告白。"},
            {"title": "美丽人生", "rating": 9.5, "year": 1997, "director": "罗伯托·贝尼尼", "genre": "剧情/喜剧", "description": "即使在黑暗中，也要相信美好。"}
        ],
        "by_genre": {
            "剧情": ["肖申克的救赎", "霸王别姬", "阿甘正传", "美丽人生", "放牛班的春天"],
            "科幻": ["星际穿越", "盗梦空间", "流浪地球", "黑客帝国", "阿凡达"],
            "动作": ["让子弹飞", "速度与激情", "碟中谍", "叶问", "战狼2"],
            "爱情": ["泰坦尼克号", "怦然心动", "你的名字", "情书", "爱乐之城"],
            "喜剧": ["三傻大闹宝莱坞", "夏洛特烦恼", "唐人街探案", "疯狂的石头", "西虹市首富"],
            "动画": ["千与千寻", "龙猫", "疯狂动物城", "寻梦环游记", "冰雪奇缘"],
            "悬疑": ["盗梦空间", "看不见的客人", "消失的爱人", "调音师", "误杀"]
        }
    };

    // ==================== 状态UI更新 ====================
    function updateStatusUI() {
        var statusBar = document.getElementById('ai-chat-status-bar');
        var dot = document.getElementById('ai-status-dot');
        var statusText = document.getElementById('ai-status-text');
        var modeLabel = document.getElementById('ai-status-mode');
        var badge = document.getElementById('mcp-status-badge');

        if (!statusBar) return;

        statusBar.style.display = 'flex';

        switch(currentMode) {
            case 'mcp':
                dot.className = 'ai-status-dot online';
                statusText.innerHTML = '✅ 智能模式已开启';
                modeLabel.className = 'ai-status-mode mcp';
                modeLabel.innerHTML = '📡 智能模式';
                if (badge) {
                    badge.style.background = '#805ad5';
                    badge.textContent = '智能';
                }
                break;
            case 'local':
                dot.className = 'ai-status-dot local';
                statusText.innerHTML = '⚠️ 离线模式';
                modeLabel.className = 'ai-status-mode local';
                modeLabel.innerHTML = '💾 离线';
                if (badge) {
                    badge.style.background = '#fbbf24';
                    badge.textContent = '离线';
                }
                break;
            case 'ai':
                dot.className = 'ai-status-dot online';
                statusText.innerHTML = '🤖 智能助手已就绪';
                modeLabel.className = 'ai-status-mode ai';
                modeLabel.innerHTML = '🤖 智能';
                if (badge) {
                    badge.style.background = '#48bb78';
                    badge.textContent = '智能';
                }
                break;
            case 'offline':
                dot.className = 'ai-status-dot offline';
                statusText.innerHTML = '❌ 离线模式';
                modeLabel.className = 'ai-status-mode';
                modeLabel.innerHTML = '⚠️ 离线';
                if (badge) {
                    badge.style.background = '#f56565';
                    badge.textContent = '离线';
                }
                break;
            default:
                dot.className = 'ai-status-dot offline';
                statusText.innerHTML = '🔄 检测中...';
                modeLabel.className = 'ai-status-mode';
                modeLabel.innerHTML = '检测中';
        }
    }

    // ==================== 位置相关 ====================
    function loadPosition() {
        var savedPos = localStorage.getItem(POSITION_KEY);
        if (savedPos) {
            var pos = JSON.parse(savedPos);
            widgetPosX = pos.x;
            widgetPosY = pos.y;
            updateWidgetPosition();
        }
    }

    function savePosition() {
        localStorage.setItem(POSITION_KEY, JSON.stringify({x: widgetPosX, y: widgetPosY}));
    }

    function updateWidgetPosition() {
        var widget = document.getElementById('ai-chat-widget');
        widget.style.left = 'auto';
        widget.style.right = 'auto';
        widget.style.bottom = 'auto';
        widget.style.top = 'auto';

        if (widgetPosX < window.innerWidth / 2) {
            widget.style.left = widgetPosX + 'px';
        } else {
            widget.style.right = (window.innerWidth - widgetPosX - 80) + 'px';
        }

        if (widgetPosY < window.innerHeight / 2) {
            widget.style.top = widgetPosY + 'px';
        } else {
            widget.style.bottom = (window.innerHeight - widgetPosY - 80) + 'px';
        }
    }

    function startDrag(event) {
        var rect = document.getElementById('ai-chat-widget').getBoundingClientRect();
        dragStartX = event.clientX;
        dragStartY = event.clientY;
        dragOffsetX = event.clientX - rect.left;
        dragOffsetY = event.clientY - rect.top;
        isDragging = true;
        hasDragged = false;
        wasOpenBeforeDrag = isOpen;
        event.preventDefault();
    }

    document.addEventListener('mousemove', function(event) {
        if (isDragging) {
            var dx = event.clientX - dragStartX;
            var dy = event.clientY - dragStartY;

            if (Math.abs(dx) > DRAG_THRESHOLD || Math.abs(dy) > DRAG_THRESHOLD) {
                if (!hasDragged && wasOpenBeforeDrag) {
                    var chatWindow = document.getElementById('ai-chat-window');
                    chatWindow.classList.remove('open');
                    isOpen = false;
                    saveChatHistory();
                }
                hasDragged = true;
            }

            if (hasDragged) {
                widgetPosX = event.clientX - dragOffsetX;
                widgetPosY = event.clientY - dragOffsetY;

                widgetPosX = Math.max(0, Math.min(widgetPosX, window.innerWidth - 80));
                widgetPosY = Math.max(0, Math.min(widgetPosY, window.innerHeight - 80));

                updateWidgetPosition();
                savePosition();
            }
        }
    });

    document.addEventListener('mouseup', function() {
        isDragging = false;
    });

    document.getElementById('ai-chat-bubble').addEventListener('mousedown', startDrag);

    document.getElementById('ai-chat-bubble').addEventListener('click', function(event) {
        if (!hasDragged) {
            toggleChatWindow();
        }
        hasDragged = false;
    });

    // ==================== 聊天窗口控制 ====================
    function toggleChatWindow() {
        var chatWindow = document.getElementById('ai-chat-window');
        isOpen = !isOpen;
        if (isOpen) {
            chatWindow.classList.add('open');
            document.getElementById('ai-chat-input').focus();
        } else {
            chatWindow.classList.remove('open');
        }
        saveChatHistory();
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }

    function addMessage(content, isUser, saveToHistory) {
        if (saveToHistory === undefined) saveToHistory = true;

        var messagesContainer = document.getElementById('ai-chat-messages');
        var messageDiv = document.createElement('div');
        messageDiv.className = 'ai-message ' + (isUser ? 'user' : 'bot');

        var avatar = document.createElement('div');
        avatar.className = 'ai-message-avatar';
        avatar.textContent = isUser ? '👤' : '🤖';

        var contentDiv = document.createElement('div');
        contentDiv.className = 'ai-message-content';

        if (typeof content === 'string') {
            contentDiv.innerHTML = content.replace(/\n/g, '<br>');
        } else {
            contentDiv.textContent = content;
        }

        messageDiv.appendChild(avatar);
        messageDiv.appendChild(contentDiv);
        messagesContainer.appendChild(messageDiv);

        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addTypingIndicator() {
        var messagesContainer = document.getElementById('ai-chat-messages');
        var typingDiv = document.createElement('div');
        typingDiv.className = 'ai-message bot';
        typingDiv.id = 'typing-indicator';

        var avatar = document.createElement('div');
        avatar.className = 'ai-message-avatar';
        avatar.textContent = '🤖';

        var contentDiv = document.createElement('div');
        contentDiv.className = 'ai-message-content ai-typing';
        contentDiv.innerHTML = '<span></span><span></span><span></span>';

        typingDiv.appendChild(avatar);
        typingDiv.appendChild(contentDiv);
        messagesContainer.appendChild(typingDiv);

        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeTypingIndicator() {
        var typing = document.getElementById('typing-indicator');
        if (typing) {
            typing.remove();
        }
    }

    function saveChatHistory() {
        var history = {
            context: chatContext,
            isOpen: isOpen
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(history));
    }

    function clearChatHistory() {
        chatContext = [];
        saveChatHistory();
        var messagesContainer = document.getElementById('ai-chat-messages');
        messagesContainer.innerHTML = '';
        addMessage('聊天历史已清除，请重新开始对话。', false, false);
    }

    function loadChatHistory() {
        var saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            var history = JSON.parse(saved);
            chatContext = history.context || [];

            var messagesContainer = document.getElementById('ai-chat-messages');
            messagesContainer.innerHTML = '';

            if (chatContext.length === 0) {
                addWelcomeMessage();
            } else {
                for (var i = 0; i < chatContext.length; i++) {
                    var turn = chatContext[i];
                    addMessage(turn.user, true, false);
                    addMessage(turn.bot, false, false);
                }
            }

            if (history.isOpen) {
                document.getElementById('ai-chat-window').classList.add('open');
                isOpen = true;
            }
        } else {
            addWelcomeMessage();
        }
    }

    function addWelcomeMessage() {
        var welcomeMsg = "🎬 您好！我是AI电影小助手！\n\n我可以帮您：\n" +
            "🔍 **搜索电影** - 如：搜索肖申克的救赎\n" +
            "🎯 **推荐电影** - 如：推荐几部好看的电影\n" +
            "🏆 **高分电影** - 如：高分电影排行榜\n" +
            "🎭 **按类型找** - 如：推荐几部科幻片\n" +
            "💬 **电影问答** - 任何关于电影的问题都可以问我！\n\n" +
            "💡 我可以帮您找电影、推荐高分片、分析类型";
        addMessage(welcomeMsg, false, false);
    }

    // ==================== 意图检测 ====================
    function detectMovieIntent(message) {
        var msg = message.toLowerCase();

        var searchPatterns = ['搜索', '查询', '找一下', '查一下', '介绍', '什么是', '看看'];
        for (var i = 0; i < searchPatterns.length; i++) {
            if (msg.includes(searchPatterns[i])) {
                var match = message.match(/[《「]?([^》」]+)[》」]?/);
                if (match && match[1].length > 1 && match[1].length < 30) {
                    return { type: 'search', movie: match[1] };
                }
                var words = message.replace(/[《》「」？?！!，,。.]/g, '').split(' ');
                for (var j = 0; j < words.length; j++) {
                    var word = words[j];
                    if (word.length >= 2 && word.length <= 15 && !word.match(/[\d\s]/)) {
                        return { type: 'search', movie: word };
                    }
                }
            }
        }

        var bookMatch = message.match(/《([^》]+)》/);
        if (bookMatch && bookMatch[1].length >= 2) {
            if (msg.includes('推荐') || msg.includes('介绍')) {
                return { type: 'search', movie: bookMatch[1] };
            }
        }

        if (msg.includes('推荐') || msg.includes('有什么好看') || msg.includes('看什么') ||
            msg.includes('好电影') || msg.includes('值得看') || msg.includes('求推荐') ||
            msg.includes('给我推荐') || msg.includes('想看')) {
            return { type: 'recommend' };
        }

        if (msg.includes('高分') || msg.includes('排行榜') || msg.includes('top') ||
            msg.includes('经典') || msg.includes('必看') || msg.includes('评分最高') ||
            msg.includes('最好看') || msg.includes('高分电影')) {
            return { type: 'top_rated' };
        }

        if ((msg.includes('比较') || msg.includes('对比')) && msg.includes('和')) {
            var movies = message.match(/[《「]?([^》」]+)[》」]?/g);
            if (movies && movies.length >= 2) {
                return {
                    type: 'compare',
                    movie1: movies[0].replace(/[《」]/g, '').trim(),
                    movie2: movies[1].replace(/[》」]/g, '').trim()
                };
            }
            var parts = message.split(/和|与|跟/);
            if (parts.length >= 2) {
                var m1 = parts[0].replace(/[比较对比]/g, '').trim();
                var m2 = parts[1].trim();
                if (m1.length >= 2 && m2.length >= 2) {
                    return { type: 'compare', movie1: m1, movie2: m2 };
                }
            }
        }

        var genres = ['剧情', '科幻', '喜剧', '爱情', '动画', '悬疑', '动作', '恐怖', '奇幻', '纪录片', '文艺'];
        for (var g = 0; g < genres.length; g++) {
            if (msg.includes(genres[g])) {
                return { type: 'by_genre', genre: genres[g] };
            }
        }

        return { type: 'none' };
    }

    // ==================== 本地响应格式化 ====================
    function formatMovieStars(rating) {
        var ratingNum = parseFloat(rating);
        if (isNaN(ratingNum)) return '';
        var fullStars = Math.floor(ratingNum / 2);
        var stars = '';
        for (var i = 0; i < fullStars; i++) stars += '★';
        for (var i = 0; i < 5 - fullStars; i++) stars += '☆';
        return stars;
    }

    function formatLocalResponse(type, result) {
        if (!result) {
            return '抱歉，获取数据失败，请稍后重试。';
        }

        if (type === 'top_rated') {
            var movies = result.movies || LOCAL_MOVIE_DATA.top_rated;
            var text = '🏆 **豆瓣高分电影排行榜**\n\n';
            for (var i = 0; i < Math.min(movies.length, 10); i++) {
                var movie = movies[i];
                var stars = formatMovieStars(movie.rating);
                text += (i+1) + '. **' + movie.title + '** ' + stars + ' ⭐ ' + movie.rating + '分\n';
                text += '   🎥 ' + movie.director + ' | 🎭 ' + movie.genre + ' | 📅 ' + movie.year + '\n\n';
            }
            text += '💡 提示：您也可以直接问我"推荐几部好看的电影"获取更多推荐！';
            return text;
        }

        if (type === 'by_genre') {
            var genreMovies = LOCAL_MOVIE_DATA.by_genre[result.genre] || LOCAL_MOVIE_DATA.by_genre['剧情'];
            var text = '🎬 **' + result.genre + '类型电影推荐**\n\n';
            for (var i = 0; i < genreMovies.length; i++) {
                text += (i+1) + '. 《' + genreMovies[i] + '》\n';
            }
            text += '\n💡 这些是经典的' + result.genre + '类型电影，值得一看！\n💡 您也可以问我更详细的推荐，比如"' + result.genre + '片推荐理由"';
            return text;
        }

        if (type === 'search') {
            var found = null;
            for (var i = 0; i < LOCAL_MOVIE_DATA.top_rated.length; i++) {
                if (LOCAL_MOVIE_DATA.top_rated[i].title === result.movie) {
                    found = LOCAL_MOVIE_DATA.top_rated[i];
                    break;
                }
            }
            if (found) {
                var stars = formatMovieStars(found.rating);
                return '🎬 **《' + found.title + '》**\n\n' +
                    stars + ' ⭐ ' + found.rating + '分\n\n' +
                    '📅 年份：' + found.year + '\n' +
                    '🎭 类型：' + found.genre + '\n' +
                    '🎥 导演：' + found.director + '\n' +
                    '📝 简介：' + found.description + '\n\n' +
                    '💡 想了解更多？可以问我"' + found.title + '的详细评价"或"类似' + found.title + '的电影"';
            }
            return '🔍 正在搜索《' + result.movie + '》...\n\n💡 您也可以直接问我"' + result.movie + '的详细评价"，我会为您详细介绍这部电影！';
        }

        return result;
    }

    // ==================== 本地MCP处理 ====================
    async function handleLocalMCP(intent, originalMessage) {
        var result = null;
        var type = intent.type;

        switch (type) {
            case 'top_rated':
                result = { movies: LOCAL_MOVIE_DATA.top_rated };
                break;
            case 'by_genre':
                result = { genre: intent.genre };
                break;
            case 'search':
                result = { movie: intent.movie };
                break;
            default:
                return false;
        }

        var formattedResponse = formatLocalResponse(type, result);
        addMessage(formattedResponse, false);
        chatContext.push({ user: originalMessage, bot: formattedResponse });
        saveChatHistory();
        return true;
    }

    // ==================== MCP工具调用 ====================
    async function callMCPTool(toolName, args) {
        try {
            var response = await fetch('/api/mcp/call', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tool: toolName, arguments: args })
            });
            var data = await response.json();
            return data;
        } catch (error) {
            console.log('调用失败:', error);
            return { success: false, error: error.message };
        }
    }

    async function handleMCPIntent(intent, originalMessage) {
        var toolName = '';
        var toolArgs = {};

        switch (intent.type) {
            case 'search':
                toolName = 'search_movie';
                toolArgs = { movie_name: intent.movie };
                break;
            case 'recommend':
                toolName = 'get_movie_recommendations';
                toolArgs = { user_id: 'user_001', top_n: 6 };
                break;
            case 'top_rated':
                toolName = 'get_top_rated_movies';
                toolArgs = { limit: 10 };
                break;
            case 'compare':
                toolName = 'compare_movies';
                toolArgs = { movie1: intent.movie1, movie2: intent.movie2 };
                break;
            case 'by_genre':
                toolName = 'get_movie_by_genre';
                toolArgs = { genre: intent.genre, limit: 8 };
                break;
            default:
                return false;
        }

        try {
            var result = await callMCPTool(toolName, toolArgs);

            if (result.success && result.result) {
                var formattedResponse = result.result;
                if (typeof formattedResponse === 'object') {
                    formattedResponse = JSON.stringify(formattedResponse, null, 2);
                }
                addMessage(formattedResponse, false);
                chatContext.push({ user: originalMessage, bot: formattedResponse });
                saveChatHistory();
                return true;
            } else {
                console.log('服务器无响应，使用本地数据');
                return await handleLocalMCP(intent, originalMessage);
            }
        } catch (error) {
            console.log('处理失败，使用本地数据:', error);
            return await handleLocalMCP(intent, originalMessage);
        }
    }

    // ==================== 智谱AI聊天 ====================
    async function callZhipuChat(message) {
        try {
            var response = await fetch('/api/zhipu/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message, context: chatContext })
            });
            var data = await response.json();
            return data;
        } catch (error) {
            console.log('调用失败:', error);
            return { success: false, error: error.message };
        }
    }

    // ==================== 服务检测 ====================
    async function testZhipuAvailable() {
        try {
            var response = await fetch('/api/zhipu/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: '你好', context: [] })
            });
            var data = await response.json();
            if (data.success) {
                currentMode = 'ai';
                updateStatusUI();
                return true;
            }
        } catch (error) {
            console.log('连接测试失败');
        }
        return false;
    }

    async function checkMCPStatus() {
        try {
            var response = await fetch('/api/mcp/status');
            var data = await response.json();
            mcpEnabled = data.mcp_enabled;

            if (mcpEnabled) {
                currentMode = 'mcp';
                updateStatusUI();
            }
            return mcpEnabled;
        } catch (error) {
            console.log('状态检查失败:', error);
            return false;
        }
    }

    async function testAllServices() {
        var mcpOk = await checkMCPStatus();

        if (!mcpOk) {
            var zhipuOk = await testZhipuAvailable();
            if (!zhipuOk) {
                currentMode = 'local';
                updateStatusUI();
            }
        }
    }

    // ==================== 主发送函数 ====================
    async function sendMessage() {
        var input = document.getElementById('ai-chat-input');
        var message = input.value.trim();

        if (!message) return;

        addMessage(message, true);
        input.value = '';

        var sendBtn = document.getElementById('ai-chat-send');
        sendBtn.disabled = true;
        addTypingIndicator();

        var intent = detectMovieIntent(message);

        if (intent.type !== 'none') {
            var handled = await handleMCPIntent(intent, message);
            if (handled) {
                sendBtn.disabled = false;
                removeTypingIndicator();
                return;
            }
        }

        try {
            var data = await callZhipuChat(message);

            if (data.success) {
                addMessage(data.response, false);
                chatContext.push({ user: message, bot: data.response });
                saveChatHistory();
            } else {
                var fallbackResponse = "🎬 我是AI电影助手！\n\n" +
                    "我可以帮您：\n" +
                    "🔍 **搜索电影** - 如：搜索肖申克的救赎\n" +
                    "🎯 **推荐电影** - 如：推荐几部好看的电影\n" +
                    "🏆 **高分电影** - 如：高分电影排行榜\n" +
                    "🎭 **按类型找** - 如：推荐几部科幻片\n\n" +
                    "💡 当前为离线模式，您的问题已经记录，请稍后重试或换个问法～";
                addMessage(fallbackResponse, false);
                chatContext.push({ user: message, bot: fallbackResponse });
                saveChatHistory();
            }
        } catch (error) {
            console.error('发送消息失败:', error);
            addMessage('抱歉，网络连接失败，请稍后重试。\n\n💡 您也可以尝试问一些电影相关的问题，如：\n- 推荐几部好看的电影\n- 搜索肖申克的救赎\n- 科幻片推荐', false);
        } finally {
            sendBtn.disabled = false;
            removeTypingIndicator();
        }
    }

    function addSystemMessage(content, save) {
        var messagesContainer = document.getElementById('ai-chat-messages');
        var messageDiv = document.createElement('div');
        messageDiv.className = 'ai-message bot';

        var avatar = document.createElement('div');
        avatar.className = 'ai-message-avatar';
        avatar.textContent = 'ℹ️';

        var contentDiv = document.createElement('div');
        contentDiv.className = 'ai-message-content';
        contentDiv.style.background = '#eef2ff';
        contentDiv.style.color = '#667eea';
        contentDiv.style.fontSize = '11px';
        contentDiv.innerHTML = content.replace(/\n/g, '<br>');

        messageDiv.appendChild(avatar);
        messageDiv.appendChild(contentDiv);
        messagesContainer.appendChild(messageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    // ==================== 初始化 ====================
    document.addEventListener('DOMContentLoaded', function() {
        var sessionFlag = sessionStorage.getItem('session_initialized');
        if (!sessionFlag) {
            localStorage.removeItem(STORAGE_KEY);
            sessionStorage.setItem('session_initialized', 'true');
        }

        loadPosition();
        loadChatHistory();
        testAllServices();

        setTimeout(function() {
            if (currentMode === 'mcp') {
                addSystemMessage('✅ 智能模式已开启，随时为您服务', false);
            } else if (currentMode === 'ai') {
                addSystemMessage('✅ 智能助手已就绪，随时为您解答电影问题', false);
            } else if (currentMode === 'local') {
                addSystemMessage('📱 当前为离线模式，推荐功能仍可用', false);
            } else {
                addSystemMessage('✅ AI电影助手已就绪！随时为您解答电影问题。', false);
            }
        }, 1000);
    });

    window.addEventListener('resize', function() {
        updateWidgetPosition();
    });
</script>

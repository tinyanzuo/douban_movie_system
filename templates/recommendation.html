<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推荐引擎 - 影视分析系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'SimHei', Arial, sans-serif; background: linear-gradient(145deg, #f0f9ff 0%, #e6f7f0 100%); min-height: 100vh; }
        .navbar { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(100, 116, 139, 0.1); }
        .nav-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .logo { font-size: 1.5rem; font-weight: 600; background: linear-gradient(135deg, #3b82f6, #10b981); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; letter-spacing: -0.3px; }
        .nav-links { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #334155; padding: 8px 16px; border-radius: 20px; transition: all 0.3s; font-weight: 500; }
        .nav-links a:hover, .nav-links a.active { background: linear-gradient(135deg, #3b82f6, #10b981); color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.2); }
        .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 24px; padding: 30px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02); border: 1px solid #eef2ff; }
        .card h2 { margin-bottom: 20px; color: #0f172a; border-left: 4px solid #3b82f6; padding-left: 15px; }
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .btn { padding: 12px 25px; border: none; border-radius: 40px; cursor: pointer; font-size: 14px; transition: all 0.3s; font-weight: 500; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #10b981); color: white; box-shadow: 0 2px 8px rgba(59,130,246,0.2); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(59,130,246,0.3); }
        .btn-upload { background: linear-gradient(135deg, #8b5cf6, #6366f1); color: white; }
        .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(139,92,246,0.3); }
        .btn-info { background: #3b82f6; color: white; }
        .btn-info:hover { background: #2563eb; transform: translateY(-2px); }
        .result-area { background: #f8fafc; border-radius: 16px; padding: 20px; min-height: 400px; border: 1px solid #eef2ff; }
        .movie-card { border-bottom: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; transition: all 0.3s; border-radius: 16px; }
        .movie-card:hover { background: #f1f5f9; transform: translateX(5px); }
        .movie-title { font-size: 1.2rem; font-weight: bold; color: #0f172a; margin-bottom: 8px; }
        .movie-rating { color: #fbbf24; margin-bottom: 8px; }
        .movie-score { display: inline-block; background: #10b981; color: white; padding: 2px 8px; border-radius: 20px; font-size: 11px; margin-left: 10px; }
        .movie-desc { color: #475569; font-size: 14px; line-height: 1.5; }
        .movie-meta { color: #64748b; font-size: 12px; margin-top: 8px; }
        .model-badge { background: linear-gradient(135deg, #3b82f6, #10b981); color: white; padding: 8px 15px; border-radius: 40px; font-size: 12px; display: inline-block; margin-bottom: 15px; }
        .loading { text-align: center; padding: 50px; color: #94a3b8; }
        .status-card { background: #f8fafc; border-radius: 16px; padding: 12px; margin-bottom: 15px; font-size: 13px; border: 1px solid #eef2ff; }
        .status-card .label { font-weight: bold; color: #1e293b; }
        .data-selector { margin: 15px 0; padding: 15px; background: #f8fafc; border-radius: 20px; display: none; border: 1px solid #eef2ff; }
        .data-selector select { width: 100%; padding: 10px; border-radius: 12px; border: 1px solid #e2e8f0; margin-top: 8px; }
        .data-selector .hint { font-size: 12px; color: #64748b; margin-top: 8px; }
        .match-reason { font-size: 11px; color: #10b981; margin-top: 5px; }
        .gift-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: giftSpin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes giftSpin { to { transform: rotate(360deg); } }
        .ai-badge { background: linear-gradient(135deg, #3b82f6, #10b981); color: white; padding: 2px 8px; border-radius: 20px; font-size: 10px; margin-left: 8px; }
        .footer-note { margin-top: 20px; padding: 12px; background: #f8fafc; border-radius: 16px; font-size: 12px; color: #64748b; text-align: center; border: 1px solid #eef2ff; }
        .footer-note div { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        @media (max-width: 768px) { .btn { width: 100%; } .nav-links a { font-size: 12px; padding: 5px 10px; } }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">🎬 豆瓣影视分析</a>
        <div class="nav-links">
            <a href="/">首页</a>
            <a href="/movie_analysis_hub">影视分析</a>
            <a href="/social_hub">社交管理</a>
            <a href="/recommendation" class="active">推荐引擎</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <div class="model-badge">
            🤖 智能推荐引擎 | 基于GLM-4大模型
        </div>

        <div id="model-status" class="status-card">
            <span class="label">🤖 推荐引擎状态:</span> <span id="status-text">检测中...</span>
            <span id="model-info" style="display: block; font-size: 12px; margin-top: 5px;"></span>
        </div>

        <div class="btn-group">
            <button class="btn btn-upload" onclick="showUploadedDataSelector()" id="show-upload-btn">📁 上传数据推荐</button>
        </div>

        <!-- 上传数据选择器 -->
        <div id="uploaded-data-selector" class="data-selector">
            <label style="font-weight: bold; display: block; margin-bottom: 8px;">📂 选择已上传的用户数据文件：</label>
            <select id="uploaded-data-select" onchange="onDataFileChange()">
                <option value="">请选择已上传的数据文件</option>
            </select>

            <div id="file-user-selector" style="margin-top: 12px; display: none;">
                <label style="font-weight: bold; display: block; margin-bottom: 8px;">👥 选择用户：</label>
                <select id="file-user-select">
                    <option value="">加载中...</option>
                </select>
            </div>

            <div class="hint">
                💡 我会根据你的观影记录，智能推荐你可能喜欢的电影
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button class="btn btn-primary" onclick="getAIRecommendation()" style="flex: 1;">🤖 开始推荐</button>
                <button class="btn btn-info" onclick="hideUploadedDataSelector()" style="flex: 0; background: #94a3b8;">取消</button>
            </div>
        </div>

        <div id="recommend-result" class="result-area">
            <div style="text-align: center; color: #94a3b8; padding: 50px;">
                🤖 点击上方按钮获取智能推荐<br>
                📁 上传Excel/CSV文件，我将分析您的观影偏好并推荐电影
            </div>
        </div>
    </div>
</div>

<script>
    let currentDataId = '';
    let currentFileUsers = [];

    function getModelStatus() {
        fetch('/api/recommender_status')
            .then(res => res.json())
            .then(data => {
                const statusText = document.getElementById('status-text');
                const modelInfo = document.getElementById('model-info');
                if (data.success && data.is_trained) {
                    statusText.innerHTML = '✅ 推荐引擎已就绪';
                    statusText.style.color = '#10b981';
                    modelInfo.innerHTML = `🤖 基于GLM-4大模型的智能推荐 | 用户数: ${data.num_users} | 电影数: ${data.num_movies}`;
                } else {
                    statusText.innerHTML = '✅ 推荐引擎已启用';
                    statusText.style.color = '#10b981';
                    modelInfo.innerHTML = '🤖 基于GLM-4大模型的智能推荐<br>💡 上传数据后点击"开始AI推荐"获取个性化推荐';
                }
            })
            .catch(() => {
                document.getElementById('status-text').innerHTML = '✅ AI推荐引擎就绪';
                document.getElementById('status-text').style.color = '#10b981';
                document.getElementById('model-info').innerHTML = '🤖 基于GLM-4大模型的智能推荐';
            });
    }

    function showUploadedDataSelector() {
        const selector = document.getElementById('uploaded-data-selector');
        if (selector.style.display === 'block') {
            selector.style.display = 'none';
            document.getElementById('show-upload-btn').textContent = '📁 上传观影记录';
        } else {
            loadUploadedDataList();
            selector.style.display = 'block';
            document.getElementById('show-upload-btn').textContent = '📁 收起选择器';
        }
    }

    function hideUploadedDataSelector() {
        document.getElementById('uploaded-data-selector').style.display = 'none';
        document.getElementById('show-upload-btn').textContent = '📁 上传观影记录';
    }

    function loadUploadedDataList() {
        fetch('/api/get_user_data_list')
            .then(res => res.json())
            .then(data => {
                const select = document.getElementById('uploaded-data-select');
                select.innerHTML = '<option value="">请选择已上传的文件</option>';
                if (data.success && data.data_list && data.data_list.length > 0) {
                    data.data_list.forEach(item => {
                        const option = document.createElement('option');
                        option.value = item.data_id;
                        let movieInfo = item.total_movies ? `, ${item.total_movies}部电影` : '';
                        let formatText = item.format === 'long' ? '长格式' : (item.format === 'wide' ? '宽格式' : '简化格式');
                        option.text = `${item.filename} (${item.total_users}位用户${movieInfo}, ${formatText})`;
                        select.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.text = '暂无上传数据，请先在社交管理页面上传文件';
                    select.appendChild(option);
                }
            })
            .catch(err => console.error('加载数据列表失败:', err));
    }

    function onDataFileChange() {
        const select = document.getElementById('uploaded-data-select');
        const dataId = select.value;
        currentDataId = dataId;

        const userSelectorDiv = document.getElementById('file-user-selector');
        const userSelect = document.getElementById('file-user-select');

        if (!dataId) {
            userSelectorDiv.style.display = 'none';
            return;
        }

        userSelectorDiv.style.display = 'block';
        userSelect.innerHTML = '<option value="">加载影迷列表中...</option>';

        fetch('/api/get_all_users_from_data', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({data_id: dataId})
        })
            .then(res => res.json())
            .then(data => {
                if (data.success && data.users && data.users.length > 0) {
                    currentFileUsers = data.users;
                    userSelect.innerHTML = '<option value="">-- 请选择影迷 --</option>';
                    data.users.forEach(user => {
                        userSelect.innerHTML += `<option value="${escapeHtml(user.nickname)}">${escapeHtml(user.nickname)} (${user.watch_count}部观影, ${user.avg_rating}分)</option>`;
                    });

                    if (data.users.length === 1) {
                        userSelect.value = data.users[0].nickname;
                    }
                } else {
                    userSelect.innerHTML = '<option value="">未找到影迷数据</option>';
                }
            })
            .catch(err => {
                console.error('加载影迷列表失败:', err);
                userSelect.innerHTML = '<option value="">加载失败</option>';
            });
    }

    async function getAIRecommendation() {
        const dataSelect = document.getElementById('uploaded-data-select');
        const dataId = dataSelect.value;
        const userSelect = document.getElementById('file-user-select');
        const selectedNickname = userSelect ? userSelect.value : '';

        if (!dataId) {
            alert('请先选择上传的数据文件');
            return;
        }

        if (!selectedNickname) {
            alert('请先选择影迷');
            return;
        }

        const resultDiv = document.getElementById('recommend-result');
        resultDiv.innerHTML = '<div class="loading"><div class="gift-spinner" style="margin: 0 auto 20px;"></div>🤖 正在分析您的观影偏好，智能推荐中...<br><span style="font-size: 12px; color: #64748b;">使用GLM-4大模型进行深度分析</span></div>';

        fetch('/api/recommend_by_ai', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                data_id: dataId,
                nickname: selectedNickname,
                top_n: 8
            })
        })
            .then(res => res.json())
            .then(data => {
                if (data.success && data.recommendations && data.recommendations.length > 0) {
                    let html = `<div style="margin-bottom: 15px; padding: 10px; background: linear-gradient(135deg, #3b82f6, #10b981); border-radius: 16px; color: white;">
                                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                                        <span>🤖 ${data.method || '智能推荐'}</span>
                                        <span>👤 ${escapeHtml(selectedNickname)}</span>
                                    </div>
                                </div>`;

                    data.recommendations.forEach((movie, i) => {
                        let scoreClass = movie.recommendation_score >= 4.5 ? '#10b981' : (movie.recommendation_score >= 4 ? '#f59e0b' : '#f97316');

                        html += `
                            <div class="movie-card">
                                <div class="movie-title">
                                    ${i+1}. 《${escapeHtml(movie.title)}》
                                    <span class="ai-badge">🤖 推荐</span>
                                    <span class="movie-score" style="background: ${scoreClass};">🎯 ${movie.recommendation_score}分</span>
                                </div>
                                <div class="movie-rating">⭐ ${movie.rating}分</div>
                                <div class="movie-desc">${escapeHtml(movie.description)}</div>
                                <div class="movie-meta">
                                    🎬 ${escapeHtml(movie.director)} | 🎭 ${escapeHtml(movie.genre)} | 📅 ${movie.year}
                                </div>
                                <div class="match-reason">💡 ${movie.match_reason}</div>
                            </div>
                        `;
                    });

                    html += `
                        <div class="footer-note">
                            <div>
                                <div>🤖 智能推荐引擎</div>
                                <div>⭐ 基于您的观影偏好分析</div>
                            </div>
                        </div>
                    `;

                    resultDiv.innerHTML = html;
                    showToast(`✅ 推荐完成！共 ${data.recommendations.length} 部电影`, 'success');
                } else {
                    resultDiv.innerHTML = `<div style="text-align: center; color: #ef4444;">❌ ${data.error || '获取推荐失败，请稍后重试'}</div>`;
                    showToast(data.error || '推荐失败', 'error');
                }
            })
            .catch(err => {
                console.error('推荐请求失败:', err);
                resultDiv.innerHTML = `<div style="text-align: center; color: #ef4444;">❌ 请求失败: ${err.message}<br><small>请检查网络连接后重试</small></div>`;
                showToast('网络请求失败', 'error');
            });
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:${type === 'error' ? '#ef4444' : '#10b981'};color:white;padding:10px 20px;border-radius:30px;z-index:10001;font-size:13px;box-shadow:0 4px 15px rgba(0,0,0,0.2);`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    getModelStatus();
    loadUploadedDataList();
</script>

{% include 'ai_chat_widget.html' %}
</body>
</html>

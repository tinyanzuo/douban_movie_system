<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影视数据分析与推荐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(145deg, #f0f9ff 0%, #e6f7f0 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(100, 116, 139, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 64px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
            letter-spacing: -0.3px;
        }

        .nav-links {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            padding: 8px 18px;
            border-radius: 40px;
            transition: all 0.25s ease;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .nav-links a:hover, .nav-links a.active {
            background: linear-gradient(135deg, #3b82f6, #10b981);
            color: white;
            box-shadow: 0 4px 12px rgba(59,130,246,0.2);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .hero {
            text-align: center;
            padding: 56px 32px;
            background: white;
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.05), 0 0 0 1px rgba(0,0,0,0.01);
            margin-bottom: 48px;
            transition: transform 0.2s;
        }

        .hero h1 {
            font-size: 2.6rem;
            background: linear-gradient(135deg, #1e293b, #3b82f6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .hero p {
            font-size: 1.2rem;
            color: #475569;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 32px;
            margin-top: 20px;
        }

        .feature-card {
            background: white;
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid #eef2ff;
        }

        .feature-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -12px rgba(59, 130, 246, 0.15);
            border-color: #bfdbfe;
        }

        .feature-icon {
            font-size: 3.4rem;
            margin-bottom: 20px;
            display: inline-block;
        }

        .feature-card h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
            color: #0f172a;
            font-weight: 600;
        }

        .feature-card p {
            color: #475569;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .stats-section {
            margin-top: 48px;
            background: white;
            border-radius: 48px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f5f9;
        }

        .stats-section h2 {
            font-size: 1.8rem;
            color: #0f172a;
            margin-bottom: 32px;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 32px;
            margin-top: 16px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(145deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: inline-block;
            margin-bottom: 8px;
        }

        .stat-label {
            color: #475569;
            margin-top: 8px;
            font-size: 1rem;
            font-weight: 500;
        }

        .footer {
            text-align: center;
            padding: 28px;
            color: #64748b;
            margin-top: 40px;
            border-top: 1px solid #e2e8f0;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .nav-links {
                gap: 6px;
            }
            .nav-links a {
                padding: 5px 12px;
                font-size: 12px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .hero {
                padding: 40px 20px;
                border-radius: 32px;
            }
            .feature-card {
                padding: 24px 16px;
            }
            .stats-section {
                padding: 32px 20px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <a href="/" class="logo">🎬 豆瓣影视分析</a>
        <div class="nav-links">
            <a href="/" class="active">首页</a>
            <a href="/movie_analysis_hub">影视分析</a>
            <a href="/social_hub">社交管理</a>
            <a href="/recommendation">推荐引擎</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h1>🎬 豆瓣影视数据分析与推荐</h1>
        <p>深度分析影视数据 · 智能社交互动 · AI精准推荐</p>
    </div>

    <div class="features">
        <a href="/movie_analysis_hub" class="feature-card">
            <div class="feature-icon">📊</div>
            <h3>影视分析</h3>
            <p>分析电影数据、查看热门评论、生成可视化图表</p>
        </a>

        <a href="/social_hub" class="feature-card">
            <div class="feature-icon">👥</div>
            <h3>社交管理</h3>
            <p>记录观影、匹配影迷、玩盲盒、答题闯关</p>
        </a>

        <a href="/recommendation" class="feature-card">
            <div class="feature-icon">🎯</div>
            <h3>推荐引擎</h3>
            <p>根据你的喜好智能推荐电影</p>
        </a>
    </div>

    <div class="stats-section">
        <h2>✨ 系统特色</h2>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number">🤖</div>
                <div class="stat-label">智能情感分析</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">🕷️</div>
                <div class="stat-label">热门评论分析</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">📊</div>
                <div class="stat-label">可视化分析</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">🎯</div>
                <div class="stat-label">智能推荐</div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <p>影视数据分析与推荐系统 | 智能情感分析 | 数据来源：豆瓣</p>
</div>

{% include 'ai_chat_widget.html' %}
</body>
</html>
